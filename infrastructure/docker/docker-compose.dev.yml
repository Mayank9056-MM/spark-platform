services:
  postgres:
    image: postgres:16-alpine
    container_name: spark-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: spark
      POSTGRES_PASSWORD: spark_dev_password
      POSTGRES_DB: spark_dev
    ports:
      - '5432:5432'
    volumes:
      - spark-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U spark -d spark_dev']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: spark-redis-dev
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - spark-redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  spark-postgres-data:
  spark-redis-data:
